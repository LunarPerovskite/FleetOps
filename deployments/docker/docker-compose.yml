version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fleetops-db
    environment:
      POSTGRES_USER: fleetops
      POSTGRES_PASSWORD: fleetops
      POSTGRES_DB: fleetops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fleetops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: fleetops-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://fleetops:fleetops@postgres:5432/fleetops
      DATABASE_URL_SYNC: postgresql://fleetops:fleetops@postgres:5432/fleetops
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: fleetops-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
  redis_data:
