version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: fleetops-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-fleetops}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-fleetops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Expose only to internal network — never to the host in production
    # If you need external access (e.g. pgAdmin), use an SSH tunnel VPN instead.
    networks:
      - fleetops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fleetops} -d ${DB_NAME:-fleetops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fleetops-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    # Internal-only; bind to the Docker network, not the host interface
    networks:
      - fleetops-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FleetOps Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fleetops-backend
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-fleetops}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-fleetops}
      - DATABASE_URL_SYNC=postgresql://${DB_USER:-fleetops}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-fleetops}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://fleetops.io}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FRONTEND_URL=${FRONTEND_URL:-https://fleetops.io}
      - FLEETOPS_MASTER_KEY=${FLEETOPS_MASTER_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
      - uploads:/app/uploads
    networks:
      - fleetops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # FleetOps Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleetops-frontend
    environment:
      - VITE_API_URL=${API_URL:-https://api.fleetops.io}
      - VITE_WS_URL=${WS_URL:-wss://api.fleetops.io}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fleetops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || echo 'No health endpoint configured'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx Reverse Proxy (SSL)
  nginx:
    image: nginx:alpine
    container_name: fleetops-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployments/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployments/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/etc/letsencrypt
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - fleetops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Certbot for SSL
  certbot:
    image: certbot/certbot
    container_name: fleetops-certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Fixed $${!} escape issue
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while true; do certbot renew; sleep 12h; done;"]
    networks:
      - fleetops-network
    depends_on:
      - nginx
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: fleetops-prometheus
    volumes:
      - ./deployments/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - fleetops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: fleetops-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployments/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deployments/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - fleetops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  uploads:
  certbot_data:
  certbot_www:
  prometheus_data:
  grafana_data:

networks:
  fleetops-network:
    driver: bridge
