version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: fleetops-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-fleetops}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-fleetops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fleetops} -d ${DB_NAME:-fleetops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fleetops-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fleetops-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fleetops-network
    restart: unless-stopped

  # FleetOps Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleetops-backend
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=postgresql://${DB_USER:-fleetops}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-fleetops}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://fleetops.io}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
      - uploads:/app/uploads
    networks:
      - fleetops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # FleetOps Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleetops-frontend
    environment:
      - VITE_API_URL=${API_URL:-https://api.fleetops.io}
      - VITE_WS_URL=${WS_URL:-wss://api.fleetops.io}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - fleetops-network
    restart: unless-stopped

  # Nginx Reverse Proxy (SSL)
  nginx:
    image: nginx:alpine
    container_name: fleetops-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/etc/letsencrypt
    depends_on:
      - backend
      - frontend
    networks:
      - fleetops-network
    restart: unless-stopped

  # Certbot for SSL
  certbot:
    image: certbot/certbot
    container_name: fleetops-certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - fleetops-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: fleetops-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - fleetops-network
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: fleetops-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - fleetops-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  uploads:
  certbot_data:
  certbot_www:
  prometheus_data:
  grafana_data:

networks:
  fleetops-network:
    driver: bridge
