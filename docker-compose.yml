version: '3.8'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: fleetops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fleetops
      POSTGRES_USER: fleetops
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fleetops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetops"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fleetops-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── FleetOps API ───────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleetops-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://fleetops:${DB_PASSWORD:-fleetops}@db/fleetops
      DATABASE_URL_SYNC: postgresql://fleetops:${DB_PASSWORD:-fleetops}@db/fleetops
      # Redis
      REDIS_URL: redis://redis:6379/0
      # Required: set in .env
      SECRET_KEY: ${SECRET_KEY}
      # Agent connectors (optional)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      # Frontend
      FRONTEND_URL: ${FRONTEND_URL:-}
      # Debug
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── (Optional) Frontend ────────────────────────────────────────────
  # Uncomment when you have a frontend
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: fleetops-frontend
  #   restart: unless-stopped
  #   depends_on:
  #     - api
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     API_URL: http://api:8000

volumes:
  postgres_data:
  redis_data:
