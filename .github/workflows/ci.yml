name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  DATABASE_URL: postgresql://postgres:test@localhost:5432/fleetops_test
  DATABASE_URL_SYNC: postgresql://postgres:test@localhost:5432/fleetops_test
  REDIS_URL: redis://localhost:6379/0
  SECRET_KEY: test-secret-key-that-is-32-bytes-long-for-ci-only
  JWT_SECRET: test-secret-key-that-is-32-bytes-long-for-ci-only

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fleetops_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov
    
    - name: Run tests
      run: |
        cd backend
        pytest tests/unit/ -v --cov=app --cov-report=xml --tb=short
      env:
        DATABASE_URL: ${{ env.DATABASE_URL }}
        DATABASE_URL_SYNC: ${{ env.DATABASE_URL_SYNC }}
        REDIS_URL: ${{ env.REDIS_URL }}
        SECRET_KEY: ${{ env.SECRET_KEY }}
        JWT_SECRET: ${{ env.JWT_SECRET }}
        PYTHONPATH: /home/runner/work/FleetOps/FleetOps/backend
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./backend/coverage.xml
        fail_ci_if_error: false

  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
      # No package-lock.json exists, skip caching
    
    - name: Install dependencies
      run: |
        cd frontend
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi
    
    - name: Build
      run: |
        cd frontend
        npm run build

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true
    
    - name: Upload to GitHub Security
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true

  lint-python:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install linting tools
      run: |
        pip install flake8 black isort mypy
    
    - name: Check formatting with black
      run: |
        cd backend
        black --check app/ || true
      continue-on-error: true
    
    - name: Check imports with isort
      run: |
        cd backend
        isort --check-only app/ || true
      continue-on-error: true
    
    - name: Lint with flake8
      run: |
        cd backend
        flake8 app/ --max-line-length=120 --extend-ignore=E203,W503 || true
      continue-on-error: true
    
    - name: Type check with mypy
      run: |
        cd backend
        mypy app/ --ignore-missing-imports || true
      continue-on-error: true
